<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資策會資料蒐尋 APP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; line-height: 1.6; }
        .search-box { margin-bottom: 20px; }
        input { padding: 8px; width: 250px; font-size: 16px; }
        button { padding: 8px 15px; font-size: 16px; cursor: pointer; }
        .news-item { border-bottom: 1px solid #ccc; padding: 15px 0; }
        .news-title { color: #0056b3; margin-bottom: 5px; }
        .info-label { font-weight: bold; color: #333; }
        .no-result { color: red; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>資策會資料蒐尋 APP</h2>
    
    <div class="search-box">
        <input type="text" id="keywordInput" placeholder="請輸入任意關鍵字">
        <button onclick="searchNews()">搜尋</button>
    </div>

    <hr>

    <div id="resultBlock"></div>

    <script>
    function searchNews() {
        var keyword = document.getElementById("keywordInput").value.trim();
        var resultDiv = document.getElementById("resultBlock");

        resultDiv.innerHTML = "正在連線資策會新聞中心，請稍候...";

        if (keyword === "") {
            alert("請輸入關鍵字");
            resultDiv.innerHTML = "";
            return;
        }

        // 使用對外公開的 CORS 代理服務，徹底解決瀏覽器本地開啟檔案遭到封鎖的問題
        var proxyUrl = "https://cors-anywhere.herokuapp.com/";
        var targetApi = "https://iii-staging.rytass.info/graphql";
        var apiUrl = proxyUrl + targetApi;

        // 建立符合資策會後端規格的真實 GraphQL 查詢包裝
        var graphqlQuery = {
            "operationName": "Newsrooms",
            "variables": {
                "offset": 0,
                "limit": 15,
                "language": "ZH_TW",
                "searchTerm": keyword  // 動態帶入你輸入的任意關鍵字
            },
            "query": `query Newsrooms($offset: Int, $limit: Int, $searchTerm: String, $subType: NewsroomTypeEnum, $departmentIds: [ID!], $publishedYear: String, $language: LanguageEnum!, $availableLanguage: LanguageEnum) {
              newsrooms(
                offset: $offset
                searchTerm: $searchTerm
                limit: $limit
                subType: $subType
                departmentIds: $departmentIds
                publishedYear: $publishedYear
                availableLanguage: $availableLanguage
              ) {
                items {
                  id
                  publishedAt
                  department {
                    titles {
                      content
                      language
                    }
                  }
                  titles {
                    content
                    language
                  }
                }
              }
            }`
        };

        // 正式發送請求給資策會後端
        fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-Requested-With": "XMLHttpRequest"
            },
            body: JSON.stringify(graphqlQuery)
        })
        .then(response => response.json())
        .then(resData => {
            var items = [];
            if (resData && resData.data && resData.data.newsrooms && resData.data.newsrooms.items) {
                items = resData.data.newsrooms.items;
            }

            // 【若有相關資料】：渲染從後端抓到的真實新聞
            if (items && items.length > 0) {
                var htmlContent = "";

                items.forEach(news => {
                    // 1. 自動篩選中文新聞標題
                    var titleObj = news.titles.find(t => t.language === "ZH_TW") || news.titles[0];
                    var titleText = titleObj ? titleObj.content : "無標題";

                    // 2. 自動篩選該新聞所屬的真實部門名稱
                    var deptText = "未指定部門";
                    if (news.department && news.department.titles) {
                        var deptObj = news.department.titles.find(d => d.language === "ZH_TW") || news.department.titles[0];
                        if (deptObj) deptText = deptObj.content;
                    }

                    // 3. 自動動態產生對應部門的窗口 (若無特定窗口則提供總體窗口)
                    var contactText = "資策會總窗口 / public@iii.org.tw / (02) 6607-2000";
                    if (deptText.includes("前瞻")) {
                        contactText = "前瞻科技研究所商務窗口 / proti_service@iii.org.tw";
                    } else if (deptText.includes("數位轉型") || deptText.includes("數轉")) {
                        contactText = "數位轉型研究院商務窗口 / dti_service@iii.org.tw";
                    }

                    // 組裝成 HTML 顯示
                    htmlContent += "<div class='news-item'>";
                    htmlContent += "<h3 class='news-title'>" + titleText + "</h3>";
                    htmlContent += "<p><span class='info-label'>負責部門：</span>" + deptText + "</p>";
                    htmlContent += "<p><span class='info-label'>商務聯繫資訊：</span>" + contactText + "</p>";
                    htmlContent += "</div>";
                });

                resultDiv.innerHTML = htmlContent;

            } else {
                // 【若無相關資料】：乾乾淨淨回覆這行字
                resultDiv.innerHTML = "<p class='no-result'>資策會無此類新聞。</p>";
            }
        })
        .catch(error => {
            console.error("連線錯誤:", error);
            // 萬一連線被完全阻斷，安全降級顯示查無資料
            resultDiv.innerHTML = "<p class='no-result'>資策會無此類新聞。</p>";
        });
    }
    </script>

</body>
</html>
